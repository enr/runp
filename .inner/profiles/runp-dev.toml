schema_version = "1"
name          = "runp-dev"
description   = "Interactive Claude Code session for developing runp (writable GOPATH/GOCACHE)"
capabilities  = ["claude"]

[sandbox]
network   = true
clipboard = false

[mounts]
"/run/user/$UID"     = { dest = "/run/user/$UID",      mode = "tmpfs" }
"${workdir}"         = { dest = "~/Projects/runp",    mode = "rw" }

[env]
clearenv = true
inherit  = ["HOME", "USER", "TERM", "LANG", "PATH", "SHELL"]

[env.set]
GOPATH  = "/tmp/gopath"
GOCACHE = "/tmp/gocache"

[entrypoint]
cmd         = "claude"
args        = []
interactive = true
tui         = true

[output]
summary         = false
log             = "~/.inner/logs/"
timeout_seconds = 0

[noop]
block = ["apt-get", "apt", "yum", "dnf", "brew", "pacman", "yay"]
